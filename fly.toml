# Studio worker · Fly.io config
#
# Background worker (sem http_service). Uma máquina persistente na região arn
# (Estocolmo), colada ao Supabase eu-north-1.
#
# IMPORTANTE: o processo chama-se `app` (não `worker`) para casar com o nome
# que a Fly Launch injeta por defeito para apps NodeJS. Se renomeares, o
# validator do Fly recusa ("Service specifies 'app' as one of its processes").

app = "cockpit-worker"
primary_region = "arn"

[build]

[processes]
  app = "node dist/index.js"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1

[deploy]
  strategy = "immediate"
