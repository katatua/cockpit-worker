# Studio worker · Fly.io config
#
# Background daemon (SEM http_service). Uma máquina persistente na região cdg,
# a fazer poll a studio_orders. NÃO abre porta HTTP.
#
# ⚠️ NÃO adicionar [http_service] — se adicionares, o Fly assume web app
# e faz auto-stop das máquinas por não haver tráfego HTTP na porta 3000.
# O sintoma disso é máquinas encravadas em "Configuring firecracker".

app = 'cockpit-worker-79fnmw'
primary_region = 'cdg'

[build]

[deploy]
  strategy = 'immediate'

[processes]
  app = 'node dist/index.js'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
