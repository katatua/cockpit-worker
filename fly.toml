# Studio worker · Fly.io config (Fatia 3b: agora com HTTP router)
#
# O worker é DAEMON de background (poll a studio_orders) MAS também expõe um
# router HTTP na porta 8080 para servir os previews inline (Fatia 3). O
# mesmo processo Node faz as duas coisas em paralelo.
#
# ⚠️ NÃO adicionar `auto_stop_machines='stop'` — mata o daemon quando não há
# tráfego HTTP. Queremos a máquina sempre ligada (o poll não é HTTP).

app = 'cockpit-worker-79fnmw'
primary_region = 'cdg'

[build]

[deploy]
  strategy = 'immediate'

[processes]
  app = 'node dist/index.js'

# Volume persistente para /data — cache de node_modules por app (~500MB cada).
# Sem isto cada preview reinstala e queima disco efémero da máquina.
[mounts]
  source = 'data'
  destination = '/data'

# HTTP router: expõe internal_port 8080 (o preview-router.ts do worker).
# auto_stop_machines='off' garantido pela ausência da flag — Fly usa 'off' por default.
[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

# 2026-07-03: OOM real em produção — kernel matou `npm install` com 3 agentes
# + dev server + chromium em 1GB (máquina 22min em thrashing, ordens órfãs).
# 2GB + swap de 1GB absorve os picos de npm/next build; MAX_CONCURRENT no
# index.ts desceu 3→2 pelo mesmo motivo.
swap_size_mb = 1024

[[vm]]
  size = 'shared-cpu-1x'
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
